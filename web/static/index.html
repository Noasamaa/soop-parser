<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>直播解析 · SOOP / YouTube / B站 / 虎牙</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="brand">
        <span class="logo">LIVE</span>
        <div>
          <h1>直播解析</h1>
          <p class="sub">SOOP · YouTube · B站 · 虎牙 · 个人使用</p>
        </div>
      </div>
      <div class="header-meta" id="configMeta">加载配置中…</div>
    </header>

    <section class="card">
      <label class="field-label" for="urlInput">直播 / 视频链接</label>
      <div class="row">
        <input
          id="urlInput"
          type="url"
          placeholder="SOOP / YouTube / live.bilibili.com / huya.com"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="resolveBtn" type="button">解析</button>
      </div>

      <div class="presets" id="presets" aria-label="常用频道"></div>

      <div class="options">
        <label class="check">
          <input type="checkbox" id="proxyToggle" checked />
          代理播放（SOOP/YouTube 用服务器 IP；B站/虎牙默认直连 CDN）
        </label>
        <label class="field-label tight" for="pwdInput">SOOP 直播密码（可选）</label>
        <input id="pwdInput" type="password" placeholder="仅 SOOP 密码房需要" autocomplete="off" />
        <div id="tokenWrap" class="hidden">
          <label class="field-label tight" for="tokenInput">访问令牌</label>
          <input id="tokenInput" type="password" placeholder="X-Access-Token" autocomplete="off" />
        </div>
      </div>
    </section>

    <section class="card hidden" id="errorCard">
      <div class="error" id="errorText"></div>
    </section>

    <section class="card hidden" id="resultCard">
      <div class="meta">
        <h2 id="titleText">—</h2>
        <div class="tags">
          <span class="tag" id="platformTag"></span>
          <span class="tag" id="liveTag"></span>
          <span class="tag" id="authorTag"></span>
          <span class="tag" id="channelTag"></span>
          <span class="tag" id="bnoTag"></span>
        </div>
      </div>

      <div class="qualities" id="qualities"></div>

      <div class="copy-row hidden" id="copyRow">
        <label class="field-label" for="playUrlOut">播放地址（可给 PotPlayer / VLC）</label>
        <div class="row">
          <input id="playUrlOut" type="text" readonly />
          <button id="copyBtn" type="button" class="ghost">复制</button>
        </div>
      </div>

      <div class="player-wrap">
        <video id="player" controls playsinline></video>
        <p class="hint" id="playHint">选择清晰度后开始播放</p>
      </div>
    </section>

    <footer class="footer">
      <p>仅供个人学习与自用。内容版权归各平台与版权方。勿公开分享代理链接。</p>
      <p>SOOP/YouTube 地区限制依赖<strong>服务器出口 IP</strong>；B站/虎牙默认返回直连地址（不占服务器流量）。FLV 建议 PotPlayer。</p>
    </footer>
  </div>
  <script src="/app.js"></script>
</body>
</html>
